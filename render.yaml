# Render blueprint — one web service that builds the SPA and runs the BFF, which
# serves dist/ + /api on a single origin. Deploy: push to a repo, "New +" →
# "Blueprint" in Render, point at this file. Set the sync:false secrets in the
# dashboard. Flip DATA_SOURCE/PAYMENT_PROVIDER to go live against Salesforce/Stripe.
services:
  - type: web
    name: meridian
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build && npm --prefix server ci --omit=dev
    startCommand: node server/src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_SOURCE
        value: mock # flip to "salesforce" once SF_* are set
      - key: PAYMENT_PROVIDER
        value: mock # flip to "stripe" once STRIPE_* are set
      - key: COOKIE_SECURE
        value: true
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_URL
        sync: false # set to the service's public URL (for sitemap/canonical)
      # --- Salesforce (only when DATA_SOURCE=salesforce) ---
      - key: SF_LOGIN_URL
        sync: false
      - key: SF_CLIENT_ID
        sync: false
      - key: SF_CLIENT_SECRET
        sync: false
      - key: SF_ACCOUNT_NAME
        value: Meridian Web Orders
      # --- Stripe (only when PAYMENT_PROVIDER=stripe; also `npm i stripe`) ---
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
