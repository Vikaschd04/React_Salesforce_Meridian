# Render blueprint — one web service that builds the SPA and runs the BFF, which
# serves dist/ + /api on a single origin. Deploy: push to a repo, "New +" →
# "Blueprint" in Render, point at this file.
#
# This deploys straight away in mock mode (no secrets to fill). To go live, add
# these in the Render dashboard (service → Environment) and redeploy:
#   PUBLIC_URL         = https://<your-service>.onrender.com   (sitemap/canonical)
#   DATA_SOURCE        = salesforce
#   SF_LOGIN_URL       = https://<your-org>.my.salesforce.com
#   SF_CLIENT_ID / SF_CLIENT_SECRET / SF_ACCOUNT_NAME
#   PAYMENT_PROVIDER   = stripe   (also add `stripe` to server deps)
#   STRIPE_SECRET_KEY / STRIPE_PUBLISHABLE_KEY
services:
  - type: web
    name: meridian
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build && npm --prefix server ci --omit=dev
    startCommand: node server/src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: DATA_SOURCE
        value: "mock"
      - key: PAYMENT_PROVIDER
        value: "mock"
      - key: COOKIE_SECURE
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
