<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D0B08" id="theme-color-meta" />
    <meta
      name="description"
      content="Meridian — single-origin coffee, roasted to its coordinates. Traceable beans from named farms, shipped fresh."
    />
    <title>Meridian — Single-Origin Coffee</title>
    <!-- Set the theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('meridian-theme')
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark'
          document.documentElement.setAttribute('data-theme', theme)
          var meta = document.getElementById('theme-color-meta')
          if (meta) meta.setAttribute('content', theme === 'light' ? '#f2ece0' : '#0d0b08')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
